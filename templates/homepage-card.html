<!-- Insert at the TOP of .issue-grid in index.html -->

<a class="issue-card" href="issues/[YYYY-MM-DD].html" data-topics="[pillar1] [pillar2]">
  <div class="card-meta">
    <span class="card-date">[Month Day, Year]</span>
    <span class="card-num">No. [N]</span>
  </div>
  <p class="card-title">[Issue Title]</p>
  <p class="card-excerpt">[One specific sentence — what the reader will learn from this issue]</p>
  <div class="card-tags">
    <span class="tag [pillar1]">[Pillar1]</span>
    <span class="tag [pillar2]">[Pillar2]</span>
  </div>
</a>

<!--
  DATA-TOPICS VALUES (space-separated, lowercase):
  gov   — Governance & Policy
  work  — Work & Organizations
  econ  — Economy & Society
  env   — Environment & Planet

  TAG CLASSES (match data-topics):
  tag gov   — slate blue
  tag work  — forest green
  tag econ  — warm gold
  tag env   — sage green
-->
